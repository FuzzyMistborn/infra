services:
  zwavejs:
    image: ghcr.io/zwave-js/zwave-js-ui:11.15.1
    container_name: zwavejs
    devices:
      - /dev/zwave:/dev/zwave
    volumes:
      - "{{ appdata_path }}/zwavejs:/usr/src/app/store"
    ports:
      - 8091:8091
      - 3500:3000
    environment:
      - TZ={{ ntp_timezone }}
    networks:
      - zwavejs-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt:2.9.2
    container_name: zigbee2mqtt
    devices:
      - /dev/zigbee:/dev/zigbee
    volumes:
      - "{{ appdata_path }}/zigbee2mqtt:/app/data"
      - /run/udev:/run/udev:ro
    ports:
      - 8080:8080
    environment:
      - TZ={{ ntp_timezone }}
    networks:
      - zigbee2mqtt-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  adguard:
    image: adguard/adguardhome:v0.107.74
    container_name: adguard
    cap_add:
      - NET_ADMIN
    volumes:
      - "{{ appdata_path }}/adguard/conf:/opt/adguardhome/conf"
      - "{{ appdata_path }}/adguard/work:/opt/adguardhome/work"
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 853:853/tcp
      - 81:80/tcp
      - 444:443/tcp
      - 3000:3000/tcp
    networks:
      - adguard-net
    restart: unless-stopped
  nut-ups:
    image: fuzzymistborn/nut-upsd:2.8.2
    container_name: nut-ups
    devices:
      - /dev/bus/usb:/dev/bus/usb
    ports:
      - 3493:3493
    environment:
      - API_USER=homeassistant
      - API_PASSWORD={{ secret_nut_api_pw }}
    networks:
      - nut-ups-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  ntp:
    image: cturra/ntp:latest
    container_name: ntp
    restart: always
    ports:
      - 123:123/udp
    environment:
      - NTP_SERVERS="north-america.pool.ntp.org,time.nist.gov,0.fedora.pool.ntp.org,0.debian.pool.ntp.org"
      - LOG_LEVEL=0
      - TZ={{ ntp_timezone }}
    networks:
      - ntp-net
    security_opt:
      - no-new-privileges:true
  beszel-agent:
    image: ghcr.io/henrygd/beszel/beszel-agent:0.18.7-alpine
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - "{{ appdata_path }}/beszel/data:/var/lib/beszel-agent"
    environment:
      - LISTEN=45876
      - HUB_URL=http://192.168.1.10:8090
      - KEY={{ secret_beszel_ssh_key_unity }}
      - TOKEN={{ secret_beszel_token_unity }}
  hawser:
    image: ghcr.io/finsys/hawser:0.2.40
    container_name: hawser
    volumes:
      - "{{ appdata_path }}/hawser:/data/stacks"
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 2376:2376
    environment:
      - TOKEN={{ secret_hawser_key }}
    networks:
      - hawser-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
networks:
  zwavejs-net:
  zigbee2mqtt-net:
  adguard-net:
  nut-ups-net:
  ntp-net:
  hawser-net:
