services:
  radarr:
    image: ghcr.io/linuxserver/radarr:6.1.1
    container_name: radarr
    volumes:
      - "{{ appdata_path }}/radarr:/config"
      - /mnt/Media/Movies:/movies
      - /mnt/Media/Kids Movies:/kids_movies
      - /mnt/Media/Parents Movies:/parents_movies
      - /mnt/scratch/complete:/downloads
    ports:
      - 7878:7878
    environment:
      - UID={{ main_uid }}
      - GID={{ main_gid }}
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
    networks:
      - arr-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  radarr_uhd:
    image: ghcr.io/linuxserver/radarr:6.1.1
    container_name: radarr_uhd
    volumes:
      - "{{ appdata_path }}/radarr_uhd:/config"
      - /mnt/Media/UHD:/uhd
      - /mnt/scratch/complete:/downloads
    ports:
      - 7879:7878
    environment:
      - UID={{ main_uid }}
      - GID={{ main_gid }}
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
    networks:
      - arr-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  sonarr:
    image: ghcr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr
    volumes:
      - "{{ appdata_path }}/sonarr:/config"
      - /mnt/Media/TV Shows:/tv
      - /mnt/Media/Kids TV:/kids_tv
      - /mnt/Media/Parents TV:/parents_tv
      - /mnt/scratch/complete:/downloads
    ports:
      - 8989:8989
    environment:
      - UID={{ main_uid }}
      - GID={{ main_gid }}
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
    networks:
      - arr-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8.5.1
    container_name: recyclarr
    user: 1000:1000
    volumes:
      - "{{ appdata_path }}/recyclarr/config:/config"
    environment:
      - TZ=America/New_York
    networks:
      - arr-net
    security_opt:
      - no-new-privileges:true
  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:2.3.5
    container_name: prowlarr
    volumes:
      - "{{ appdata_path }}/prowlarr:/config"
    ports:
      - 9696:9696
    environment:
      - UID={{ main_uid }}
      - GID={{ main_gid }}
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
    networks:
      - arr-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  sabnzbd:
    image: ghcr.io/linuxserver/sabnzbd:4.5.5
    container_name: sabnzbd
    volumes:
      - "{{ appdata_path }}/sabnzb:/config"
      - /mnt/scratch/complete:/downloads
      - /mnt/scratch/incomplete:/incomplete-downloads
    ports:
      - 8060:8080
      - 9080:9090
    environment:
      - UID={{ main_uid }}
      - GID={{ main_gid }}
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
    networks:
      - arr-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.1.0
    init: true
    container_name: seerr
    environment:
      - TZ={{ ntp_timezone }}
    ports:
      - 5055:5055
    volumes:
      - "{{ appdata_path }}/seerr:/app/config"
    networks:
      - seerr-net
    security_opt:
      - no-new-privileges:true
    restart: always
  yamtrack:
    image: ghcr.io/fuzzygrim/yamtrack:0.25.2
    container_name: yamtrack
    ports:
      - 8000:8000
    depends_on:
      - yamtrack-redis
    volumes:
      - "{{ appdata_path }}/yamtrack/db:/yamtrack/db"
    environment:
      - TZ={{ ntp_timezone }}
      - SECRET=lztZqfM2Ac5MFoZ86hn7mw+pGretDlfb9A==
      - REDIS_URL=redis://yamtrack-redis:6379
    networks:
      - yamtrack-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  yamtrack-redis:
    container_name: yamtrack-redis
    image: redis:8.6.2-alpine
    restart: unless-stopped
    volumes:
      - "{{ appdata_path }}/yamtrack/redis:/data"
    networks:
      - yamtrack-net
    security_opt:
      - no-new-privileges:true
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.33.1
    container_name: audiobookshelf
    volumes:
      - "{{ appdata_path }}/audiobookshelf/config:/config"
      - "{{ appdata_path }}/audiobookshelf/metadata:/metadata"
      - /mnt/Media/Audiobooks:/audiobooks
    ports:
      - 13378:80
    environment:
      - UID={{ main_uid }}
      - GID={{ main_gid }}
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
    networks:
      - audiobookshelf-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  nextcloud:
    image: ghcr.io/fuzzymistborn/nextcloud-docker:33.0.2
    container_name: nextcloud
    volumes:
      - "{{ appdata_path }}/nextcloud_docker/html:/var/www/html"
    ports:
      - 3491:80
      - 3492:443
    environment:
      - UID={{ main_uid }}
      - GID={{ main_gid }}
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
    networks:
      - nextcloud-net
    security_opt:
      - no-new-privileges:true
    mem_limit: 1000M
    memswap_limit: 1000M
    restart: unless-stopped
  nextcloud-redis:
    image: redis:8.6.2
    container_name: nextcloud-redis
    networks:
      - nextcloud-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  navidrome:
    image: ghcr.io/navidrome/navidrome:0.61.1
    container_name: navidrome
    volumes:
      - "{{ appdata_path }}/navidrome/data:/data"
      - /mnt/Media/Music:/music:ro
    ports:
      - 4533:4533
    environment:
      - ND_ENABLECOVERANIMATION=false
      - ND_ENABLEINSIGHTSCOLLECTOR=false
      - ND_SCANSCHEDULE=12h
      - ND_BASEURL=https://music.{{ secret_personal_internal_url }}
    networks:
      - navidrome-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  grimmory:
    image: ghcr.io/grimmory-tools/grimmory:v2.3.0
    container_name: grimmory
    environment:
      - USER_ID={{ main_uid }}
      - GROUP_ID={{ main_gid }}
      - TZ={{ ntp_timezone }}
      - DATABASE_URL=jdbc:mariadb://192.168.50.22:3310/booklore
      - DATABASE_USERNAME=booklore
      - DATABASE_PASSWORD={{ secret_booklore_db_pass }}
      - BOOKLORE_PORT=6060
    ports:
      - 6060:6060
    volumes:
      - "{{ appdata_path }}/grimmory/data:/app/data"
      - /mnt/Media/Ebooks/Grimmory:/books
      - /mnt/Media/Ebooks/Grimmory-Import:/bookdrop
    networks:
      - grimmory-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  romm:
    image: rommapp/romm:4.8.1
    container_name: romm
    restart: unless-stopped
    environment:
      - DB_HOST=192.168.50.22
      - DB_PORT=3309
      - DB_NAME=romm
      - DB_USER=romm-user
      - DB_PASSWD={{ secret_romm_db_pass }}
      - TZ={{ ntp_timezone }}
      - ROMM_AUTH_SECRET_KEY={{ secret_romm_auth_key }}
      - SCREENSCRAPER_USER=fuzzymistborn
      - SCREENSCRAPER_PASSWORD={{ secret_screenscraper_pass }}
      - STEAMGRIDDB_API_KEY={{ secret_steamgrid_api_key }}
      - HASHEOUS_API_ENABLED=true
      - OIDC_ENABLED=true
      - OIDC_PROVIDER=pocketid
      - OIDC_CLIENT_ID={{ secret_romm_pocket_id_user }}
      - OIDC_CLIENT_SECRET={{ secret_romm_pocket_id_key }}
      - OIDC_REDIRECT_URI=https://roms.{{ secret_personal_url }}/api/oauth/openid
      - OIDC_SERVER_APPLICATION_URL=https://id.{{ secret_personal_url }}/
    volumes:
      - "{{ appdata_path }}/ROMM/config:/romm/config"
      - "{{ appdata_path }}/ROMM/redis:/redis-data"
      - /mnt/Media/Files/Roms/ROMM/resources:/romm/resources
      - /mnt/Media/Files/Roms/ROMM/library:/romm/library
      - /mnt/Media/Files/Roms/ROMM/assets:/romm/assets
    ports:
      - 2500:8080
    networks:
      - romm-net
    security_opt:
      - no-new-privileges:true
  crowdsec:
    image: ghcr.io/crowdsecurity/crowdsec:v1.7.7
    container_name: crowdsec
    volumes:
      - "{{ appdata_path }}/crowdsec/data/acquis.yaml:/etc/crowdsec/acquis.yaml"
      - "{{ appdata_path }}/nextcloud_docker/html/data:/var/log/nextcloud:ro"
      - "{{ appdata_path }}/sonarr/logs:/var/log/sonarr:ro"
      - "{{ appdata_path }}/radarr/logs:/var/log/radarr:ro"
      - "{{ appdata_path }}/crowdsec/db:/var/lib/crowdsec/data/"
    environment:
      - COLLECTIONS=schiz0phr3ne/sonarr schiz0phr3ne/radarr crowdsecurity/nextcloud
      - GID=1000
      - DISABLE_LOCAL_API=true
      - AGENT_USERNAME={{ hostname }}
      - AGENT_PASSWORD={{ secret_crowdsec_endowment_pw }}
      - LOCAL_API_URL=http://{{ secret_ambition_ip }}:8080
    networks:
      - crowdsec-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  beszel-agent:
    image: ghcr.io/henrygd/beszel/beszel-agent:0.18.7-alpine
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - "{{ appdata_path }}/beszel/data:/var/lib/beszel-agent"
    environment:
      - LISTEN=45876
      - HUB_URL=http://192.168.1.10:8090
      - KEY={{ secret_beszel_ssh_key_endowment }}
      - TOKEN={{ secret_beszel_token_endowment }}
  hawser:
    image: ghcr.io/finsys/hawser:0.2.39
    container_name: hawser
    volumes:
      - "{{ appdata_path }}/hawser:/data/stacks"
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 2376:2376
    environment:
      - TOKEN={{ secret_hawser_key }}
    networks:
      - hawser-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  arr-net:
  yamtrack-net:
  audiobookshelf-net:
  nextcloud-net:
  navidrome-net:
  grimmory-net:
  romm-net:
  seerr-net:
  crowdsec-net:
  hawser-net: