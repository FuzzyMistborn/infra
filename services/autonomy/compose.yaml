services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    volumes:
      - /home/{{ main_username }}/hass:/config
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/Media:/media:ro
    depends_on:
      - mqtt
    restart: unless-stopped
  homeassistant-beta:
    image: ghcr.io/home-assistant/home-assistant:beta
    container_name: homeassistant-beta
    network_mode: host
    volumes:
      - /home/{{ main_username }}/hass_docker_beta:/config
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 5316:5316
    depends_on:
      - mqtt
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  selenium:
    image: selenium/standalone-firefox:149.0
    container_name: selenium
    ports:
      - 4444:4444
    environment:
      - SE_NODE_MAX_SESSIONS=2
      - TZ={{ ntp_timezone }}
    shm_size: 2g
    networks:
      - selenium-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  esphome:
    image: ghcr.io/esphome/esphome:2026.3.2
    container_name: esphome
    network_mode: host
    volumes:
      - "{{ appdata_path }}/esphome:/config"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  mqtt:
    image: eclipse-mosquitto:2.0.22
    container_name: MQTT
    volumes:
      - "{{ appdata_path }}/mqtt/config:/mosquitto/config/"
      - "{{ appdata_path }}/mqtt/data:/mosquitto/data/"
      - "{{ appdata_path }}/mqtt/log:/mosquitto/log/"
    ports:
      - 1883:1883
    networks:
      - mqtt-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  govee2mqtt:
    image: ghcr.io/wez/govee2mqtt:2026.03.25-ab9deb66
    container_name: govee2mqtt
    network_mode: host
    environment:
      - TZ={{ ntp_timezone }}
      - RUST_LOG_STYLE=always
#      - GOVEE_EMAIL={{ secret_govee_user }}
#      - GOVEE_PASSWORD={{ secret_govee_pass }}
      - GOVEE_API_KEY={{ secret_govee_api }}
      - GOVEE_MQTT_HOST=192.168.30.5
      - GOVEE_MQTT_PORT=1883
      - GOVEE_MQTT_USER=homeassistant
      - GOVEE_MQTT_PASSWORD={{ secret_mqtt_pass }}
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:8.1.0
    container_name: matter-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - "{{ appdata_path }}/matter-server/data:/data/"
    security_opt:
      - no-new-privileges:true
  signal-api:
    image: bbernhard/signal-cli-rest-api:0.98
    container_name: signal-api
    volumes:
      - "{{ appdata_path }}/signal-api:/home/.local/share/signal-cli"
    ports:
      - 8080:8080
    environment:
      - MODE=native
    networks:
      - signal-api-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  nodered:
    image: nodered/node-red:4.1.8
    container_name: nodered
    volumes:
      - "{{ appdata_path }}/nodered:/data"
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 1880:1880
    environment:
      - TZ={{ ntp_timezone }}
    depends_on:
      - homeassistant
    networks:
      - nodered-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  tasmota:
    image: ghcr.io/tasmoadmin/tasmoadmin:v5.0.0
    container_name: tasmota
    volumes:
      - "{{ appdata_path }}/tasmota:/data"
    ports:
      - 5555:80
    networks:
      - tasmota-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  anylist:
    image: kevdliu/anylist:v1.7.3
    container_name: anylist
    volumes:
      - "{{ appdata_path }}/anylist:/data"
    ports:
      - 9500:9000
    environment:
      - PORT=9000
      - EMAIL={{ secret_email }}
      - PASSWORD={{ secret_anylist_pw }}
    networks:
      - anylist-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  music-assistant:
    image: ghcr.io/music-assistant/server:2.8.2
    container_name: music-assistant
    network_mode: host
    privileged: true
    volumes:
      - "{{ appdata_path }}/music-assistant:/data"
    restart: unless-stopped
  crowdsec:
    image: ghcr.io/crowdsecurity/crowdsec:v1.7.7
    container_name: crowdsec
    volumes:
      - "{{ appdata_path }}/crowdsec/data/acquis.yaml:/etc/crowdsec/acquis.yaml"
      - /home/{{ main_username }}/hass/:/var/log/homeassistant:ro
      - "{{ appdata_path }}/crowdsec/db:/var/lib/crowdsec/data/"
    environment:
      - COLLECTIONS=crowdsecurity/home-assistant
      - GID=1000
      - DISABLE_LOCAL_API=true
      - AGENT_USERNAME={{ hostname }}
      - AGENT_PASSWORD={{ secret_crowdsec_autonomy_pw }}
      - LOCAL_API_URL=http://{{ secret_ambition_ip }}:8080
    networks:
      - crowdsec-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  beszel-agent:
    image: ghcr.io/henrygd/beszel/beszel-agent:0.18.7-alpine
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - "{{ appdata_path }}/beszel/data:/var/lib/beszel-agent"
    environment:
      - LISTEN=45876
      - HUB_URL=http://192.168.1.10:8090
      - KEY={{ secret_beszel_ssh_key_autonomy }}
      - TOKEN={{ secret_beszel_token_autonomy }}
  hawser:
    image: ghcr.io/finsys/hawser:0.2.39
    container_name: hawser
    volumes:
      - "{{ appdata_path }}/hawser:/data/stacks"
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 2376:2376
    environment:
      - TOKEN={{ secret_hawser_key }}
    networks:
      - hawser-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
networks:
  selenium-net:
  mqtt-net:
  signal-api-net:
  nodered-net:
  tasmota-net:
  anylist-net:
  crowdsec-net:
  hawser-net: