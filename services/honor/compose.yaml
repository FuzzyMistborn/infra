services:
  adguard:
    image: adguard/adguardhome:v0.107.74
    container_name: adguard
    cap_add:
      - NET_ADMIN
    volumes:
      - "{{ appdata_path }}/adguard/conf:/opt/adguardhome/conf"
      - "{{ appdata_path }}/adguard/work:/opt/adguardhome/work"
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 853:853/tcp
      - 81:80/tcp
      - 444:443/tcp
      - 3000:3000/tcp
    networks:
      - adguard-net
    restart: unless-stopped
  crowdsec:
    image: ghcr.io/crowdsecurity/crowdsec:v1.7.7
    container_name: crowdsec
    volumes:
      - "{{ appdata_path }}/crowdsec/data/acquis.yaml:/etc/crowdsec/acquis.yaml"
      - /var/log/auth.log:/var/log/ssh/auth.log:ro
      - "{{ appdata_path }}/crowdsec/db:/var/lib/crowdsec/data/"
    environment:
      - COLLECTIONS=crowdsecurity/http-cve crowdsecurity/whitelist-good-actors crowdsecurity/sshd
      - GID=1000
      - DISABLE_LOCAL_API=true
      - AGENT_USERNAME={{ hostname }}
      - AGENT_PASSWORD={{ secret_crowdsec_honor_pw }}
      - LOCAL_API_URL=http://{{ secret_ambition_ip }}:8080
    networks:
      - crowdsec-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2.5.0
    container_name: pocket-id
    restart: unless-stopped
    environment:
      - APP_NAME=Identity
      - APP_URL=https://id.{{ secret_personal_url }}
      - TRUST_PROXY=true
      - SESSION_DURATION=120
      - MAXMIND_LICENSE_KEY={{ secret_pocket_id_maxmind_api }}
      - ENCRYPTION_KEY={{ secret_pocket_id_encryption_key }}
      - PUID=1000
      - PGID=1000
      - ALLOW_OWN_ACCOUNT_EDIT=true
      - EMAILS_VERIFIED=true
      - EMAIL_ONE_TIME_ACCESS_AS_ADMIN_ENABLED=true
      - SMTP_HOST={{ secret_snapraid_smtp_host }}
      - SMTP_PORT=587
      - SMTP_FROM=pocketid@{{ secret_personal_url }}
      - SMTP_USER={{ secret_snapraid_email_address }}
      - SMTP_PASSWORD={{ secret_snapraid_email_pass }}
      - SMTP_TLS=starttls
    ports:
      - 1411:1411
    volumes:
      - "{{ appdata_path }}/pocketid/data:/app/data"
    networks:
      - pocket-id-net
    security_opt:
      - no-new-privileges:true
  adguard-sync:
    image: ghcr.io/linuxserver/adguardhome-sync:0.9.0
    container_name: adguard-sync
    volumes:
      - "{{ appdata_path }}/adguardsync/config:/config"
    ports:
      - 8080:8080
    environment:
      - UID={{ main_uid }}
      - GID={{ main_gid }}
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
    networks:
      - adguard-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  beszel-agent:
    image: ghcr.io/henrygd/beszel/beszel-agent:0.18.7-alpine
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - "{{ appdata_path }}/beszel/data:/var/lib/beszel-agent"
    environment:
      - LISTEN=45876
      - HUB_URL=http://192.168.1.10:8090
      - KEY={{ secret_beszel_ssh_key_honor }}
      - TOKEN={{ secret_beszel_token_honor }}
  ha-mcp:
    image: ghcr.io/homeassistant-ai/ha-mcp:7.2.0
    container_name: ha-mcp
    ports:
      - 8086:8086
    environment:
      - HOMEASSISTANT_URL=http://192.168.30.5:8123
      - HOMEASSISTANT_TOKEN={{ secret_ha_mcp_token }}
      - MCP_SECRET_PATH=/private_{{ secret_ha_mcp_path }}
    command: ha-mcp-web
    networks:
      - ha-mcp-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  hawser:
    image: ghcr.io/finsys/hawser:0.2.39
    container_name: hawser
    volumes:
      - "{{ appdata_path }}/hawser:/data/stacks"
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 2376:2376
    environment:
      - TOKEN={{ secret_hawser_key }}
    networks:
      - hawser-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
networks:
  adguard-net:
  pocket-id-net:
  crowdsec-net:
  hawser-net:
  ha-mcp-net: