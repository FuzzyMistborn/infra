services:
  freshrss:
    image: freshrss/freshrss:1.28.1
    container_name: freshrss
    volumes:
      - "{{ appdata_path }}/freshrss/data:/var/www/FreshRSS/data"
      - "{{ appdata_path }}/freshrss/extensions:/var/www/FreshRSS/extensions"
    ports:
      - 8010:80
    environment:
      - UID={{ main_uid }}
      - GID={{ main_gid }}
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
      - CRON_MIN=*/20
      - OIDC_ENABLED=1
      - OIDC_CLIENT_ID={{ secret_freshrss_pocket_id_user }}
      - OIDC_CLIENT_SECRET={{ secret_freshrss_pocket_id_key }}
      - OIDC_PROVIDER_METADATA_URL=https://id.{{ secret_personal_url }}/.well-known/openid-configuration
      - OIDC_SCOPES=openid email profile
      - OIDC_X_FORWARDED_HEADERS=X-Forwarded-Proto X-Forwarded-Host
      - OIDC_REMOTE_USER_CLAIM=preferred_username
      - OIDC_SESSION_INACTIVITY_TIMEOUT=43200
      - OIDC_SESSION_MAX_DURATION=0
    networks:
      - freshrss-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  freshrss-digest:
    image: ghcr.io/fuzzymistborn/freshrss-digest:latest
    container_name: freshrss-digest
    environment:
      - FRESHRSS_URL=http://freshrss:80
      - FRESHRSS_USER={{ main_username }}
      - FRESHRSS_API_PASS={{ secret_freshrss_api_pass }}
      - FEED_ID=user/-/label/BitFlip
      - LLAMACPP_URL=http://192.168.50.25:8080
      - LLAMACPP_MODEL=gemma-4-e4b
      - SUMMARY_MAX_WORDS=100
      - SMTP_HOST={{ secret_snapraid_smtp_host }}
      - SMTP_PORT=587
      - SMTP_USER={{ secret_snapraid_email_from }}
      - SMTP_PASS=Economy.Pushup.Untold7
      - SMTP_FROM={{ secret_snapraid_email_from }}
      - SMTP_TO={{ secret_email }}
      - SMTP_USE_TLS=false
      - CRON_SCHEDULE=0 7 * * *
      - TZ={{ ntp_timezone }}
      - RUN_ON_START=false
      - MAX_ARTICLES=40
    networks:
      - freshrss-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  freshrss-net:
