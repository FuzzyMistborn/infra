services:
  romm-db:
    image: mariadb:12.2.2
    container_name: romm-db
    volumes:
      - "{{ appdata_path }}/romm_db:/var/lib/mysql"
    ports:
      - 3309:3306
    environment:
      - MYSQL_ROOT_PASSWORD={{ secret_db_root_pass }}
      - MYSQL_DATABASE=romm
      - MYSQL_USER=romm-user
      - MYSQL_PASSWORD={{ secret_romm_db_pass }}
    networks:
      - romm-db-net
    mem_limit: 300M
    memswap_limit: 300M
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  romm-db-net:
