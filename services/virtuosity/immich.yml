services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.7.5
    container_name: immich-server
    volumes:
      - /mnt/immich-uploads:/usr/src/app/upload
      - /mnt/photos:/mnt/photos:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 2283:2283
    environment:
      - DB_PASSWORD={{ secret_immich_db_pass }}
      - DB_USERNAME=postgres
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      - DB_HOSTNAME=immich-database
    depends_on:
      - immich-redis
      - immich-database
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
                - compute
                - video
    networks:
      - immich-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5-cuda
    container_name: immich_machine_learning
    volumes:
      - "{{ appdata_path }}/immich/model-cache:/cache"
    depends_on:
      - immich-redis
      - immich-database
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    networks:
      - immich-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  immich-redis:
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    container_name: immich_redis
    networks:
      - immich-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  immich-database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich_database
    volumes:
      - "{{ appdata_path }}/immich/database:/var/lib/postgresql/data"
    environment:
      - POSTGRES_PASSWORD={{ secret_immich_db_pass }}
      - POSTGRES_USER=postgres
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS='--data-checksums'
    networks:
      - immich-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  immich-net:
