---

- name: install dependencies for nodesource repo
  package:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: download nodesource gpg key
  get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource.gpg.key
    mode: "0644"

- name: dearmor nodesource gpg key
  shell: gpg --dearmor < /tmp/nodesource.gpg.key > /etc/apt/keyrings/nodesource.gpg
  args:
    creates: /etc/apt/keyrings/nodesource.gpg

- name: add nodesource apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_major_version }}.x nodistro main"
    state: present
    filename: nodesource

- name: install nodejs
  package:
    name: nodejs
    state: present

- name: install bitwarden cli via npm
  community.general.npm:
    name: "@bitwarden/cli"
    global: true
    state: "{{ 'latest' if bw_download_latest_ver else 'present' }}"
    version: "{{ bw_pinned_ver if not bw_download_latest_ver else omit }}"
